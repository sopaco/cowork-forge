# AI Context Manifest
# Version: 1.0.0
# Generated: 2026-03-28
# Project: cowork-forge v2.5.0

manifest_version: "1.0"
project:
  name: cowork-forge
  version: "2.5.0"
  language: rust
  edition: "2024"

documents:
  - path: project.snapshot
    type: overview
    purpose: Minimal context for understanding project structure
    token_estimate: 2500
    
  - path: core/modules.map
    type: reference
    purpose: Module dependencies and navigation
    token_estimate: 3000
    
  - path: core/constraints.md
    type: rules
    purpose: Security, rate limits, and behavioral constraints
    token_estimate: 2000
    
  - path: domains/pipeline.md
    type: domain
    purpose: Pipeline orchestration domain knowledge
    token_estimate: 1500
    
  - path: domains/domain-logic.md
    type: domain
    purpose: Core business entities (DDD)
    token_estimate: 1500
    
  - path: domains/tools.md
    type: domain
    purpose: Tool ecosystem reference
    token_estimate: 2000
    
  - path: domains/interaction.md
    type: domain
    purpose: User interaction abstraction
    token_estimate: 1000
    
  - path: domains/persistence.md
    type: domain
    purpose: Storage layer reference
    token_estimate: 1000
    
  - path: domains/agents.md
    type: domain
    purpose: Agent builders reference
    token_estimate: 2000
    
  - path: api/traits.md
    type: api
    purpose: Key trait definitions
    token_estimate: 1500
    
  - path: prompts/coding-context.md
    type: template
    purpose: Pre-generated context for coding tasks
    token_estimate: 1000
    
  - path: prompts/debug-context.md
    type: template
    purpose: Pre-generated context for debugging
    token_estimate: 1000
    
  - path: prompts/review-context.md
    type: template
    purpose: Pre-generated context for code review
    token_estimate: 1000

usage:
  # For coding tasks
  recommended_context:
    - project.snapshot
    - core/modules.map
    - domains/pipeline.md (if modifying pipeline)
    - domains/tools.md (if adding/modifying tools)
    - core/constraints.md
    - prompts/coding-context.md
  
  # For debugging
  debug_context:
    - project.snapshot
    - core/modules.map
    - core/constraints.md
    - prompts/debug-context.md
  
  # For code review
  review_context:
    - core/constraints.md
    - domains/domain-logic.md
    - prompts/review-context.md

total_token_estimate: 22000
