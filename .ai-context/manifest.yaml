# AI Context Manifest
# Version: 2.1.0
# Updated: 2026-03-29
# Project: cowork-forge v2.5.0

manifest_version: "2.1"
project:
  name: cowork-forge
  version: "2.5.0"
  language: rust
  edition: "2024"

documents:
  - path: project.snapshot
    purpose: Project structure, storage, config
    tokens: ~800
    
  - path: core/modules.map
    purpose: Module dependencies, navigation
    tokens: ~800
    
  - path: core/constraints.md
    purpose: Security, limits, HITL rules
    tokens: ~400

  - path: domains/pipeline.md
    purpose: Pipeline + Agents
    tokens: ~500
    
  - path: domains/domain-logic.md
    purpose: Core entities, relationships
    tokens: ~400
    
  - path: domains/tools.md
    purpose: Tool categories reference
    tokens: ~400

  - path: architecture-decisions.md
    purpose: Non-obvious design decisions
    tokens: ~500

  - path: prompts/coding-context.md
    purpose: Code style, common patterns
    tokens: ~500

usage:
  coding_context:
    - project.snapshot
    - core/modules.map
    - core/constraints.md
    - domains/pipeline.md
    - domains/tools.md
    - architecture-decisions.md
  
  debug_context:
    - project.snapshot
    - core/constraints.md
    - architecture-decisions.md

total_tokens: ~4300

# =============================================================================
# MAINTENANCE GUIDE
# =============================================================================
#
# | Code Change              | Update File            |
# |--------------------------|------------------------|
# | New tool                 | domains/tools.md       |
# | New stage                | domains/pipeline.md    |
# | New module               | core/modules.map       |
# | New constraint           | core/constraints.md    |
# | Architecture decision    | architecture-decisions.md |
# | New crate                | project.snapshot       |
#
# | NO UPDATE: struct fields, function signatures, refactoring |
#
# Command: "Update .ai-context because I [added/changed] [specific thing]"
# =============================================================================
